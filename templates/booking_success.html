<!DOCTYPE html>
<html>
<head>
    <title>Booking Confirmed</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            text-align:center;
            width:350px;
        }

        h2{
            color:green;
        }

        p{
            font-size:16px;
            margin:10px 0;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        a:hover{
            background:#0056b3;
        }

    </style>
</head>

<body>

<div class="box">

<h2>Booking Successful 🎉</h2>

<p><b>Hotel:</b> {{ hotel }}</p>

<p><b>Location:</b> {{ location }}</p>

<p><b>Total Price:</b> ₹{{ price }}</p>

<a href="/">Back to Home</a>

</div>

</body>
</html>
